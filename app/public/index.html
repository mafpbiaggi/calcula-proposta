<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<title>Calculadora de Propostas</title>
	<link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
	<form method="POST" id="formCalc">
		<label for="nome">Nome</label>
		<input name="nome" id="nome" type="text"><br><br>

		<label for="documento">CPF</label>
		<input name="documento" id="documento" type="text" oninput="mask(this, 'CPF')" placeholder="111.111.111-11" maxlength="14"><br><br>

		<label for="valorBem">Valor do bem <i>(apenas números)</i></label>
		<input name="valorBem" id="valorBem" type="number" placeholder="Ex: 100000"><br><br>

		<label for="percPago">Percentual pago <i>(apenas números)</i></label>
		<input name="percPago" id="percPago" type="text" placeholder="%"><br><br>

		<label for="encrGrupo">Encerramento do grupo</label>
		<input name="encrGrupo" id="encrGrupo" type="date"><br><br>

		<button type="submit" class="calc-button">CALCULAR</button>
	</form>
	<br><span id="msgAlerta"></span>
	<script type="text/javascript" src="https://momentjs.com/downloads/moment.min.js"></script>
	<script type="text/javascript" src="assets/js/calc.js"></script>
    <script type="text/javascript" src="assets/js/mask.js"></script>

</body>

</html>
