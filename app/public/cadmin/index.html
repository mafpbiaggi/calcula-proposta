<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<title>Relatório de Simulações</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
</head>

<body style="padding: 50px;">
	<center>
		<h3>Relatório de Simulações</h3>
		<h5>Coleta simulações cadastradas no banco de dados</h5>
		<span id="msgAlerta"></span>
	</center>

	<form method="POST" id="formConsulta" style="margin-top: 50px; margin-bottom: 50px;">
		<div class="row justify-content-md-center">
			<div class="col col-xs-12 col-sm-6 col-md-4 col-lg-3 col-xl-2">
				<div class="input-group input-group-sm mb-3">
					<label class="input-group-text" for="dataInicial">De:</label>
					<input class="form-control" name="dataInicial" id="dataInicial" type="date"/>
				</div>
			</div>

			<div class="col col-xs-12 col-sm-6 col-md-4 col-lg-3 col-xl-2">
				<div class="input-group input-group-sm mb-3">
					<label class="input-group-text" for="dataFinal">Até:</label>
					<input class="form-control" name="dataFinal" id="dataFinal" type="date"/>
				</div>
			</div>

			<div class="col col-lg-2 col-xl-1">
				<button type="submit" class=" form-control btn btn-sm btn-primary">Consultar</button>
			</div>

			<div class="col col-lg-2 col-xl-1">
				<button type="button" class="form-control btn btn-sm btn-dark" onclick="limpaTela()">Limpar</button>
			</div>
		</div>
	</form>

	<table class="table table-striped table-bordered" style="margin-bottom: 50px;">
		<thead class="thead-dark" id="resultHead">
		</thead>
		<tbody id="resultBody">
		</tbody>
	</table>

	<span id="resultExport"></span>

	<script type="text/javascript" src="/cadmin/cadmin.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
		integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
		crossorigin="anonymous"></script>
</body>

</html>
